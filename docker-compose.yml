services:
  db:
    image: postgres:16
    container_name: inventorypulse-db
    environment:
      POSTGRES_DB: inventorypulse
      POSTGRES_USER: inventorypulse
      POSTGRES_PASSWORD: inventorypulse
    ports:
      - "5432:5432"
    volumes:
      - inventorypulse_pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: inventorypulse-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://inventorypulse:inventorypulse@db:5432/inventorypulse
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend/app:/app/app
      - ./storage:/app/storage

  frontend:
    build: ./frontend
    container_name: inventorypulse-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  inventorypulse_pgdata:
